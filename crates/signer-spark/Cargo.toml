[package]
name = "signer-spark"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Spark (Bitcoin L2) transaction signer — secp256k1 ECDSA."

[features]
default = ["std"]
std = ["alloc", "signer-core/std", "zeroize/std"]
alloc = ["signer-core/alloc", "zeroize/alloc"]
getrandom = ["rand_core/getrandom"]
kobe = ["dep:kobe-spark"]

[dependencies]
signer-core.workspace = true
k256.workspace = true
rand_core.workspace = true
sha2.workspace = true
hex.workspace = true
zeroize.workspace = true
thiserror.workspace = true

kobe-spark = { workspace = true, optional = true }

[lints]
workspace = true
