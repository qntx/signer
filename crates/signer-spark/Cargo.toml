[package]
name = "signer-spark"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Spark (Bitcoin L2) transaction signer — secp256k1 ECDSA."

[features]
default = ["std"]
std = ["alloc", "signer-primitives/std", "zeroize/std"]
alloc = ["signer-primitives/alloc", "zeroize/alloc"]
getrandom = ["dep:getrandom"]
kobe = ["dep:kobe-spark"]

[dependencies]
signer-primitives.workspace = true
k256.workspace = true
getrandom = { workspace = true, optional = true }
sha2.workspace = true
ripemd.workspace = true
bs58.workspace = true
hex.workspace = true
zeroize.workspace = true
thiserror.workspace = true

kobe-spark = { workspace = true, optional = true }

[lints]
workspace = true
