[package]
name = "signer-btc"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Bitcoin transaction signer — secp256k1 ECDSA, message signing."

[features]
default = ["std"]
std = ["alloc", "signer-primitives/std", "zeroize/std"]
alloc = ["signer-primitives/alloc", "zeroize/alloc"]
getrandom = ["rand_core/getrandom"]
kobe = ["dep:kobe-btc"]

[dependencies]
signer-primitives.workspace = true
k256.workspace = true
rand_core.workspace = true
sha2.workspace = true
hex.workspace = true
zeroize.workspace = true
thiserror.workspace = true

kobe-btc = { workspace = true, optional = true }

[lints]
workspace = true
