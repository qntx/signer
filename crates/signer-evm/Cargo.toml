[package]
name = "signer-evm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "EVM transaction signer — EIP-191, EIP-712, typed transaction signing."

[features]
default = ["std"]
std = ["alloc", "signer-core/std", "zeroize/std"]
alloc = ["signer-core/alloc", "zeroize/alloc"]
getrandom = ["rand_core/getrandom"]
kobe = ["dep:kobe-evm"]

[dependencies]
signer-core.workspace = true
k256.workspace = true
rand_core.workspace = true
sha3.workspace = true
hex.workspace = true
serde_json.workspace = true
zeroize.workspace = true
thiserror.workspace = true

kobe-evm = { workspace = true, optional = true }

[lints]
workspace = true
