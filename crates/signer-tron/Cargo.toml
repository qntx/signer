[package]
name = "signer-tron"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "TRON transaction signer — secp256k1 ECDSA + Keccak-256."

[features]
default = ["std"]
std = ["alloc", "signer-core/std", "zeroize/std"]
alloc = ["signer-core/alloc", "zeroize/alloc"]
getrandom = ["rand_core/getrandom"]
kobe = ["dep:kobe-tron"]

[dependencies]
signer-core.workspace = true
k256.workspace = true
rand_core.workspace = true
sha2.workspace = true
sha3.workspace = true
hex.workspace = true
zeroize.workspace = true
thiserror.workspace = true

kobe-tron = { workspace = true, optional = true }

[lints]
workspace = true
