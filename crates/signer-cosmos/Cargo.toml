[package]
name = "signer-cosmos"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Cosmos transaction signer — secp256k1 ECDSA + SHA-256."

[features]
default = ["std"]
std = ["alloc", "signer-primitives/std", "zeroize/std"]
alloc = ["signer-primitives/alloc", "zeroize/alloc"]
getrandom = ["rand_core/getrandom"]
kobe = ["dep:kobe-cosmos"]

[dependencies]
signer-primitives.workspace = true
k256.workspace = true
rand_core.workspace = true
sha2.workspace = true
ripemd.workspace = true
bech32.workspace = true
hex.workspace = true
zeroize.workspace = true
thiserror.workspace = true

kobe-cosmos = { workspace = true, optional = true }

[lints]
workspace = true
